<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Les Twins</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

<style>
/* TES STYLES ORIGINAUX (STRICTEMENT IDENTIQUES) */
:root {
  --bg:#0d0d0f; --surface:#17171a; --surface2:#1f1f24;
  --accent:#e8ff47; --accent2:#ff4757;
  --text:#f0f0f0; --muted:#6b6b7a; --border:rgba(255,255,255,0.07);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(232,255,71,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(232,255,71,0.03) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0;}
.wrap{position:relative;z-index:1;max-width:700px;margin:0 auto;padding:2rem 1.2rem 4rem;}
header{text-align:center;margin-bottom:3rem;}
.logo{font-family:'Bebas Neue',sans-serif;font-size:clamp(52px,14vw,96px);letter-spacing:4px;line-height:1;color:var(--accent);text-shadow:0 0 60px rgba(232,255,71,0.25);}
.subtitle{font-size:13px;letter-spacing:3px;text-transform:uppercase;color:var(--muted);margin-top:6px;}
#loginGate{display:flex;flex-direction:column;align-items:center;}
#loginGate .card{width:100%;max-width:420px;}
#app{display:none;}
.tabs{display:flex;gap:8px;justify-content:center;margin-bottom:2rem;flex-wrap:wrap;}
.tab{background:var(--surface);border:1px solid var(--border);color:var(--muted);font-family:'DM Sans',sans-serif;font-size:13px;letter-spacing:1px;text-transform:uppercase;padding:8px 22px;border-radius:99px;cursor:pointer;transition:all 0.2s;position:relative;}
.tab.active{background:var(--accent);color:#0d0d0f;border-color:var(--accent);font-weight:500;}
.notif-dot{position:absolute;top:4px;right:4px;width:8px;height:8px;background:var(--accent2);border-radius:50%;display:none;}
.notif-dot.show{display:block;}
.view{display:none;}.view.active{display:block;}
.board{display:flex;flex-direction:column;gap:10px;}
.player-row{background:var(--surface);border:1px solid var(--border);border-radius:14px;display:flex;align-items:center;padding:14px 18px;gap:16px;transition:border-color 0.2s,transform 0.2s;animation:fadeUp 0.4s ease both;}
.rank-1{border-color:rgba(232,255,71,0.5);background:linear-gradient(90deg,rgba(232,255,71,0.06),var(--surface));}
.rank-num{font-family:'Bebas Neue',sans-serif;font-size:28px;width:36px;text-align:center;color:var(--muted);flex-shrink:0;}
.avatar{width:42px;height:42px;border-radius:50%;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-weight:500;font-size:15px;flex-shrink:0;border:2px solid var(--border);color:var(--accent);}
.player-name{flex:1;font-size:16px;font-weight:500;}
.pts-big{font-family:'Bebas Neue',sans-serif;font-size:32px;color:var(--accent);min-width:56px;text-align:right;}
.pts-label{font-size:11px;color:var(--muted);text-align:right;letter-spacing:1px;text-transform:uppercase;}
.admin-pts-ctrl{display:none;align-items:center;gap:6px;}
body.admin-mode .admin-pts-ctrl{display:flex;}
body.admin-mode .pts-static{display:none;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:28px;margin-bottom:16px;}
.card h2{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:2px;color:var(--accent);margin-bottom:20px;}
.btn-main{width:100%;background:var(--accent);color:#0d0d0f;border:none;border-radius:10px;padding:13px;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:500;cursor:pointer;margin-top:4px;}
.qcard{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:18px 20px;margin-bottom:10px;}
.qcheck{width:22px;height:22px;border-radius:6px;border:2px solid var(--border);background:var(--surface2);cursor:pointer;display:flex;align-items:center;justify-content:center;}
.qcheck.accepted{background:var(--accent);color:#000;}
.qcheck.pending{background:rgba(232,255,71,0.2);}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="logo">Les Twins</div>
    <div class="subtitle">Classement des défis</div>
  </header>

  <div id="loginGate">
    <div class="card" id="formRegister">
      <h2>Créer un compte</h2>
      <input type="text" id="regName" placeholder="Pseudo" class="btn-sub" style="background:var(--surface2);color:#fff;padding:10px;margin-bottom:10px;width:100%;border:1px solid var(--border);border-radius:8px;">
      <input type="password" id="regPass" placeholder="Mot de passe" style="background:var(--surface2);color:#fff;padding:10px;margin-bottom:10px;width:100%;border:1px solid var(--border);border-radius:8px;">
      <button class="btn-main" onclick="register()">S'inscrire</button>
      <p onclick="toggleLogin(true)" style="text-align:center;margin-top:10px;font-size:12px;cursor:pointer;color:var(--muted)">Déjà un compte ? Connecte-toi</p>
    </div>
    <div class="card" id="formLogin" style="display:none;">
      <h2>Connexion</h2>
      <input type="text" id="loginName" placeholder="Pseudo" style="background:var(--surface2);color:#fff;padding:10px;margin-bottom:10px;width:100%;border:1px solid var(--border);border-radius:8px;">
      <input type="password" id="loginPass" placeholder="Mot de passe" style="background:var(--surface2);color:#fff;padding:10px;margin-bottom:10px;width:100%;border:1px solid var(--border);border-radius:8px;">
      <button class="btn-main" onclick="login()">Se connecter</button>
      <p onclick="toggleLogin(false)" style="text-align:center;margin-top:10px;font-size:12px;cursor:pointer;color:var(--muted)">Pas de compte ? Inscris-toi</p>
    </div>
  </div>

  <div id="app">
    <div class="tabs">
      <button class="tab active" onclick="showTab('classement')">Classement</button>
      <button class="tab" onclick="showTab('quetes')">Quêtes</button>
      <button class="tab" onclick="showTab('admin')">Admin <span id="notif" class="notif-dot"></span></button>
      <button class="tab" onclick="logout()" style="color:var(--accent2)">Quitter</button>
    </div>

    <div id="view-classement" class="view active">
      <div class="board" id="board"></div>
    </div>

    <div id="view-quetes" class="view">
      <div id="admin-q-add" style="display:none;" class="card">
         <h2>Ajouter une quête</h2>
         <input id="newQTitle" placeholder="Titre" style="width:100%;margin-bottom:10px;padding:8px;">
         <input id="newQPts" type="number" placeholder="Points" style="width:100%;margin-bottom:10px;padding:8px;">
         <button class="btn-main" onclick="addQuete()">Ajouter</button>
      </div>
      <div id="listQuetes"></div>
    </div>

    <div id="view-admin" class="view">
      <div id="adminAuth" class="card">
        <h2>Pass Admin</h2>
        <input type="password" id="passAdmin" style="width:100%;padding:10px;margin-bottom:10px;">
        <button class="btn-main" onclick="checkAdmin()">Entrer</button>
      </div>
      <div id="adminPanel" style="display:none;">
        <div class="card">
          <h2>Demandes à valider</h2>
          <div id="adminDemandes"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
// CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyDo3kpFvkpAZN_dD7V6XhVsYtK7SOar5Y0",
  authDomain: "les-twins-53038.firebaseapp.com",
  projectId: "les-twins-53038",
  databaseURL: "https://les-twins-53038-default-rtdb.europe-west1.firebasedatabase.app/"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let ME = localStorage.getItem('twins_user');
let IS_ADMIN = false;

// --- LE CŒUR DU SYSTÈME (Synchro totale) ---
db.ref('/').on('value', snap => {
  const data = snap.val() || {};
  updateUI(data);
});

function updateUI(data) {
  // 1. Classement (TOUS les joueurs de la DB)
  const players = Object.values(data.players || {}).sort((a,b) => b.points - a.points);
  document.getElementById('board').innerHTML = players.map((p, i) => `
    <div class="player-row ${i==0?'rank-1':''}">
      <div class="rank-num">${i+1}</div>
      <div class="avatar">${p.name[0].toUpperCase()}</div>
      <div class="player-name">${p.name} ${p.name==ME?'(toi)':''}</div>
      <div class="pts-static"><div class="pts-big">${p.points}</div><div class="pts-label">pts</div></div>
      <div class="admin-pts-ctrl">
        <button onclick="changePts('${p.name}', 1)">+</button>
        <button onclick="changePts('${p.name}', -1)">-</button>
      </div>
    </div>
  `).join('');

  // 2. Quêtes
  const quetes = Object.values(data.quetes || {});
  document.getElementById('listQuetes').innerHTML = quetes.map(q => {
    const maDemande = Object.values(data.demandes || {}).find(d => d.user == ME && d.qId == q.id);
    const status = maDemande ? maDemande.status : '';
    return `
      <div class="qcard">
        <div style="display:flex; justify-content:space-between; align-items:center;">
          <div style="display:flex; gap:15px; align-items:center;">
             <div class="qcheck ${status}" onclick="demander('${q.id}')">${status=='accepted'?'✓':(status=='pending'?'⏳':'')}</div>
             <div><b>${q.title}</b></div>
          </div>
          <div class="pts-big" style="font-size:20px">${q.pts}</div>
        </div>
      </div>
    `;
  }).join('');

  // 3. Admin Demandes
  const demandes = Object.values(data.demandes || {}).filter(d => d.status == 'pending');
  document.getElementById('notif').style.display = demandes.length ? 'block' : 'none';
  document.getElementById('adminDemandes').innerHTML = demandes.map(d => `
    <div class="card" style="margin-bottom:5px;">
      ${d.user} a fait : ${d.qTitle}
      <button onclick="valider('${d.id}', true)">OUI</button>
      <button onclick="valider('${d.id}', false)">NON</button>
    </div>
  `).join('') || 'Aucune demande.';
}

// --- ACTIONS ---
function register() {
  const n = document.getElementById('regName').value.trim();
  const p = document.getElementById('regPass').value;
  if(!n || !p) return;
  db.ref('players/'+n).set({name:n, pass:p, points:0});
  loginDirect(n);
}

function login() {
  const n = document.getElementById('loginName').value.trim();
  const p = document.getElementById('loginPass').value;
  db.ref('players/'+n).once('value', s => {
    if(s.val() && s.val().pass == p) loginDirect(n);
    else alert("Erreur pseudo/pass");
  });
}

function loginDirect(n) {
  ME = n; localStorage.setItem('twins_user', n);
  document.getElementById('loginGate').style.display = 'none';
  document.getElementById('app').style.display = 'block';
}

function demander(qid) {
  db.ref('quetes/'+qid).once('value', s => {
    const q = s.val();
    db.ref('demandes/'+ME+'_'+qid).set({id:ME+'_'+qid, user:ME, qId:qid, qTitle:q.title, qPts:q.pts, status:'pending'});
  });
}

function valider(did, ok) {
  db.ref('demandes/'+did).once('value', s => {
    const d = s.val();
    if(ok) {
       db.ref('players/'+d.user+'/points').transaction(p => (p||0) + d.qPts);
       db.ref('demandes/'+did+'/status').set('accepted');
    } else {
       db.ref('demandes/'+did).remove();
    }
  });
}

function changePts(name, val) {
  db.ref('players/'+name+'/points').transaction(p => (p||0) + val);
}

function addQuete() {
  const id = Date.now();
  const t = document.getElementById('newQTitle').value;
  const p = parseInt(document.getElementById('newQPts').value);
  db.ref('quetes/'+id).set({id, title:t, pts:p});
}

function checkAdmin() {
  if(document.getElementById('passAdmin').value == 'twins2024') {
    document.body.classList.add('admin-mode');
    document.getElementById('adminAuth').style.display = 'none';
    document.getElementById('adminPanel').style.display = 'block';
    document.getElementById('admin-q-add').style.display = 'block';
  }
}

function toggleLogin(show) {
  document.getElementById('formLogin').style.display = show ? 'block' : 'none';
  document.getElementById('formRegister').style.display = show ? 'none' : 'block';
}

function showTab(id) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById('view-'+id).classList.add('active');
}

function logout() { localStorage.clear(); location.reload(); }

if(ME) loginDirect(ME);
</script>
</body>
</html>
