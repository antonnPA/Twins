<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Les Twins</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

    <style>
        :root {
            --bg: #0d0d0f;
            --surface: #17171a;
            --surface2: #1f1f24;
            --accent: #e8ff47;
            --accent2: #ff4757;
            --text: #f0f0f0;
            --muted: #6b6b7a;
            --border: rgba(255,255,255,0.07);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: 
                linear-gradient(rgba(232, 255, 71, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(232, 255, 71, 0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
            z-index: 0;
        }

        .wrap {
            position: relative;
            z-index: 1;
            max-width: 700px;
            margin: 0 auto;
            padding: 2rem 1.2rem 4rem;
        }

        header { text-align: center; margin-bottom: 3rem; }
        .logo {
            font-family: 'Bebas Neue', sans-serif;
            font-size: clamp(52px, 14vw, 96px);
            letter-spacing: 4px;
            line-height: 1;
            color: var(--accent);
            text-shadow: 0 0 60px rgba(232, 255, 71, 0.25);
        }
        .subtitle {
            font-size: 13px;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--muted);
            margin-top: 6px;
        }

        /* --- LOGIN GATE --- */
        #loginGate { display: flex; flex-direction: column; align-items: center; }
        #loginGate .card { width: 100%; max-width: 420px; }
        #app { display: none; }

        /* --- TABS --- */
        .tabs {
            display: flex;
            gap: 8px;
            justify-content: center;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }
        .tab {
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--muted);
            font-family: 'DM Sans', sans-serif;
            font-size: 13px;
            letter-spacing: 1px;
            text-transform: uppercase;
            padding: 8px 22px;
            border-radius: 99px;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
        }
        .tab:hover { border-color: var(--accent); color: var(--accent); }
        .tab.active {
            background: var(--accent);
            color: #0d0d0f;
            border-color: var(--accent);
            font-weight: 500;
        }
        .tab.logout-tab { border-color: rgba(255, 71, 87, 0.4); color: var(--accent2); }
        .tab.logout-tab:hover { background: rgba(255, 71, 87, 0.1); }
        
        .notif-dot {
            position: absolute;
            top: 4px;
            right: 4px;
            width: 8px;
            height: 8px;
            background: var(--accent2);
            border-radius: 50%;
            display: none;
            border: 2px solid var(--surface);
        }
        .notif-dot.show { display: block; }
        .view { display: none; }
        .view.active { display: block; }

        /* --- CLASSEMENT --- */
        .board { display: flex; flex-direction: column; gap: 10px; }
        .player-row {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 14px;
            display: flex;
            align-items: center;
            padding: 14px 18px;
            gap: 16px;
            transition: border-color 0.2s, transform 0.2s;
            animation: fadeUp 0.4s ease both;
        }
        .player-row:hover { border-color: rgba(232, 255, 71, 0.2); transform: translateX(3px); }
        .rank-1 { border-color: rgba(232, 255, 71, 0.5); background: linear-gradient(90deg, rgba(232, 255, 71, 0.06), var(--surface)); }
        .rank-2 { border-color: rgba(180, 200, 60, 0.3); }
        .rank-3 { border-color: rgba(255, 71, 87, 0.3); }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .rank-num {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 28px;
            width: 36px;
            text-align: center;
            color: var(--muted);
            flex-shrink: 0;
        }
        .rank-1 .rank-num { color: var(--accent); }
        .rank-2 .rank-num { color: #b4c83c; }
        .rank-3 .rank-num { color: var(--accent2); }

        .avatar {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background: var(--surface2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 500;
            font-size: 15px;
            flex-shrink: 0;
            border: 2px solid var(--border);
            color: var(--accent);
        }

        .player-name { flex: 1; font-size: 16px; font-weight: 500; }
        .player-meta { font-size: 12px; color: var(--muted); margin-top: 2px; }

        .pts-big {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 32px;
            color: var(--accent);
            min-width: 56px;
            text-align: right;
        }
        .pts-label {
            font-size: 11px;
            color: var(--muted);
            text-align: right;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .admin-pts-ctrl { display: none; align-items: center; gap: 6px; }
        body.admin-mode .admin-pts-ctrl { display: flex; }
        body.admin-mode .pts-static { display: none; }

        .btn-round {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            border: 1px solid var(--border);
            background: var(--surface2);
            color: var(--text);
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .pts-input {
            width: 60px;
            background: var(--surface2);
            border: 1px solid var(--border);
            color: var(--accent);
            text-align: center;
            font-family: 'Bebas Neue', sans-serif;
            font-size: 20px;
            border-radius: 6px;
        }

        /* --- CARDS --- */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 28px;
            margin-bottom: 16px;
        }
        .card h2 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 28px;
            letter-spacing: 2px;
            color: var(--accent);
            margin-bottom: 20px;
        }

        .field { margin-bottom: 16px; }
        .field label {
            display: block;
            font-size: 12px;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 6px;
        }
        .field input, .field textarea {
            width: 100%;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 12px 14px;
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: 15px;
            outline: none;
        }

        .btn-main {
            width: 100%;
            background: var(--accent);
            color: #0d0d0f;
            border: none;
            border-radius: 10px;
            padding: 13px;
            font-family: 'DM Sans', sans-serif;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
        }

        /* --- QUETES (CORRECTIONS ICI) --- */
        .qcard {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 18px 20px;
            margin-bottom: 10px;
            transition: all 0.3s ease;
        }
        /* Effet Grisé */
        .qcard.is-pending { opacity: 0.5; filter: grayscale(0.5); background: rgba(255,255,255,0.02); }
        .qcard.is-accepted { opacity: 0.4; border-color: var(--accent); filter: grayscale(0.8); }
        
        .qheader { display: flex; align-items: flex-start; gap: 12px; }
        .qcheck {
            width: 24px;
            height: 24px;
            border-radius: 6px;
            border: 2px solid var(--border);
            background: var(--surface2);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            font-size: 14px;
        }
        /* Case Cochée / Attente */
        .qcheck.pending { background: rgba(232, 255, 71, 0.2); border-color: var(--accent); color: var(--accent); cursor: default; }
        .qcheck.accepted { background: var(--accent); border-color: var(--accent); color: #000; cursor: default; }
        
        .qtitle { font-size: 16px; font-weight: 500; margin-bottom: 4px; }
        .qdesc { font-size: 13px; color: var(--muted); line-height: 1.5; }
        
        .qstatus-badge { 
            font-size: 10px; 
            font-weight: 700; 
            text-transform: uppercase; 
            margin-top: 8px; 
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
        }

        .qpts { font-family: 'Bebas Neue', sans-serif; font-size: 26px; color: var(--accent); }

        /* --- MESSAGERIE ADMIN --- */
        .mcard {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 10px;
        }
        .mactions { display: flex; gap: 10px; margin-top: 12px; }
        .btn-sm { padding: 6px 12px; border-radius: 6px; border: none; cursor: pointer; font-size: 12px; font-weight: 500; }
        .btn-ok { background: var(--accent); color: #000; }
        .btn-ko { background: var(--accent2); color: #fff; }
    </style>
</head>
<body>

<div class="wrap">
    <header>
        <div class="logo">Les Twins</div>
        <div class="subtitle">Classement des défis</div>
    </header>

    <div id="loginGate">
        <div class="card" id="formRegister">
            <h2>Créer un compte</h2>
            <div class="field"><label>Pseudo</label><input type="text" id="regName"></div>
            <div class="field"><label>Mot de passe</label><input type="password" id="regPass"></div>
            <button class="btn-main" onclick="register()">S'inscrire</button>
            <p onclick="switchForm('login')" style="margin-top:15px; font-size:13px; color:var(--muted); cursor:pointer; text-align:center;">Déjà un compte ? <u>Se connecter</u></p>
        </div>
        <div class="card" id="formLogin" style="display:none;">
            <h2>Connexion</h2>
            <div class="field"><label>Pseudo</label><input type="text" id="loginName"></div>
            <div class="field"><label>Mot de passe</label><input type="password" id="loginPass"></div>
            <button class="btn-main" onclick="login()">Se connecter</button>
            <p onclick="switchForm('register')" style="margin-top:15px; font-size:13px; color:var(--muted); cursor:pointer; text-align:center;">Pas de compte ? <u>S'inscrire</u></p>
        </div>
    </div>

    <div id="app">
        <div id="greetBar" style="text-align:center; margin-bottom:1.5rem; color:var(--muted); font-size:14px;">
            Bienvenue, <strong id="greetName" style="color:var(--accent);"></strong>
        </div>

        <div class="tabs">
            <button class="tab active" id="tabClassement" onclick="showTab('classement')">Classement</button>
            <button class="tab" id="tabQuetes" onclick="showTab('quetes')">Quêtes</button>
            <button class="tab" id="tabRegles" onclick="showTab('regles')">Règles</button>
            <button class="tab" id="tabAdmin" onclick="showTab('admin')">Admin <span id="notifDot" class="notif-dot"></span></button>
            <button class="tab logout-tab" onclick="logout()">Quitter</button>
        </div>

        <div id="view-classement" class="view active">
            <div class="board" id="board"></div>
        </div>

        <div id="view-quetes" class="view">
            <div id="admin-q-form" style="display:none;" class="card">
                <h2>Ajouter une quête</h2>
                <div class="field"><label>Titre</label><input type="text" id="qTitre"></div>
                <div class="field"><label>Description</label><textarea id="qDesc"></textarea></div>
                <div class="field"><label>Points</label><input type="number" id="qPts"></div>
                <button class="btn-main" onclick="addQuete()">Publier la quête</button>
            </div>
            <div id="listQuetes"></div>
        </div>

        <div id="view-regles" class="view">
            <div class="card">
                <h2>Règles du jeu</h2>
                <div id="reglesDisplay" style="line-height:1.6; white-space:pre-wrap;"></div>
                <div id="admin-regles-edit" style="display:none; margin-top:20px; border-top:1px solid var(--border); padding-top:20px;">
                    <div class="field"><label>Modifier les règles</label><textarea id="reglesInput" rows="10"></textarea></div>
                    <button class="btn-main" onclick="saveRegles()">Mettre à jour</button>
                </div>
            </div>
        </div>

        <div id="view-admin" class="view">
            <div class="card" id="adminAuth">
                <h2>Authentification</h2>
                <div class="field"><label>Code secret</label><input type="password" id="adminPass"></div>
                <button class="btn-main" onclick="checkAdmin()">Accéder</button>
            </div>
            <div id="adminPanel" style="display:none;">
                <div class="card">
                    <h2>Demandes en attente</h2>
                    <div id="adminDemandes"></div>
                </div>
                <button class="btn-main" style="background:var(--accent2); color:#fff;" onclick="resetScores()">Réinitialiser tous les points</button>
            </div>
        </div>
    </div>
</div>

<script>
// --- FIREBASE CONFIG ---
const firebaseConfig = {
    apiKey: "AIzaSyDo3kpFvkpAZN_dD7V6XhVsYtK7SOar5Y0",
    authDomain: "les-twins-53038.firebaseapp.com",
    projectId: "les-twins-53038",
    databaseURL: "https://les-twins-53038-default-rtdb.europe-west1.firebasedatabase.app/"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let ME = localStorage.getItem('twins_user');
let IS_ADMIN = localStorage.getItem('twins_is_admin') === 'true';

// --- SYNC ---
db.ref('/').on('value', snapshot => {
    const data = snapshot.val() || {};
    renderBoard(data.players || {});
    renderQuetes(data.quetes || {}, data.demandes || {});
    renderRegles(data.regles || "");
    renderAdminDemandes(data.demandes || {});
});

function register() {
    const name = document.getElementById('regName').value.trim();
    const pass = document.getElementById('regPass').value;
    if (!name || !pass) return alert("Remplis tout !");
    db.ref('players/' + name).set({ name, pass, points: 0 }).then(() => loginSuccess(name));
}

function login() {
    const name = document.getElementById('loginName').value.trim();
    const pass = document.getElementById('loginPass').value;
    db.ref('players/' + name).once('value', s => {
        const u = s.val();
        if (u && u.pass === pass) loginSuccess(name);
        else alert("Pseudo ou pass incorrect");
    });
}

function loginSuccess(name) {
    ME = name;
    localStorage.setItem('twins_user', name);
    document.getElementById('loginGate').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    document.getElementById('greetName').textContent = name;
    if (IS_ADMIN) showAdminPanel();
}

function renderBoard(players) {
    const container = document.getElementById('board');
    const sorted = Object.values(players).sort((a,b) => b.points - a.points);
    container.innerHTML = sorted.map((p, i) => {
        const rank = i + 1;
        const medal = rank === 1 ? '🥇' : rank === 2 ? '🥈' : rank === 3 ? '🥉' : rank;
        return `
            <div class="player-row rank-${rank > 3 ? 'other' : rank}">
                <div class="rank-num">${medal}</div>
                <div class="avatar">${p.name[0].toUpperCase()}</div>
                <div class="player-name">${p.name} ${p.name === ME ? '<small>(toi)</small>' : ''}</div>
                <div class="admin-pts-ctrl">
                    <button class="btn-round" onclick="updatePts('${p.name}', -1)">-</button>
                    <input class="pts-input" type="number" value="${p.points}" onchange="setPts('${p.name}', this.value)">
                    <button class="btn-round" onclick="updatePts('${p.name}', 1)">+</button>
                </div>
                <div class="pts-static"><div class="pts-big">${p.points}</div><div class="pts-label">points</div></div>
            </div>`;
    }).join('');
}

// --- LOGIQUE QUETES ---
function renderQuetes(quetes, demandes) {
    const container = document.getElementById('listQuetes');
    const mesDemandes = Object.values(demandes || {}).filter(d => d.user === ME);

    container.innerHTML = Object.values(quetes).map(q => {
        const maDemande = mesDemandes.find(d => d.qId == q.id);
        const status = maDemande ? maDemande.status : '';
        
        let statusHtml = '';
        let icon = '';
        let cardClass = '';

        if(status === 'pending') {
            cardClass = 'is-pending';
            statusHtml = '<span class="qstatus-badge" style="background:rgba(232,255,71,0.1); color:var(--accent);">⌛ En attente</span>';
            icon = '⏳';
        } else if(status === 'accepted') {
            cardClass = 'is-accepted';
            statusHtml = '<span class="qstatus-badge" style="background:rgba(76,175,80,0.1); color:#4caf50;">✅ Validée</span>';
            icon = '✓';
        }

        return `
            <div class="qcard ${cardClass}">
                <div class="qheader">
                    <div class="qcheck ${status}" onclick="sendDemande('${q.id}', '${status}')">${icon}</div>
                    <div class="qinfo">
                        <div class="qtitle">${q.title}</div>
                        <div class="qdesc">${q.desc}</div>
                        ${statusHtml}
                    </div>
                    <div style="text-align:right"><div class="qpts">${q.pts}</div><div style="font-size:10px; color:var(--muted);">pts</div></div>
                </div>
                <div style="display:${IS_ADMIN?'block':'none'}; margin-top:10px;">
                    <button class="btn-sm btn-ko" onclick="deleteQuete('${q.id}')">Supprimer</button>
                </div>
            </div>`;
    }).join('');
}

function sendDemande(qid, status) {
    // Si déjà envoyé ou fini, on ne fait rien
    if (status === 'pending' || status === 'accepted') return;

    db.ref('quetes/' + qid).once('value', s => {
        const q = s.val();
        if(!q) return;
        db.ref('demandes/' + ME + '_' + qid).set({
            id: ME + '_' + qid, user: ME, qId: qid, qTitle: q.title, qPts: q.pts, status: 'pending'
        });
    });
}

function renderRegles(txt) {
    document.getElementById('reglesDisplay').textContent = txt || "Aucune règle.";
    document.getElementById('reglesInput').value = txt || "";
}

function saveRegles() {
    db.ref('regles').set(document.getElementById('reglesInput').value);
}

function checkAdmin() {
    if (document.getElementById('adminPass').value === 'twins2024') {
        IS_ADMIN = true;
        localStorage.setItem('twins_is_admin', 'true');
        showAdminPanel();
        location.reload(); // Recharge pour bien activer les boutons partout
    } else alert("Code erroné");
}

function showAdminPanel() {
    document.body.classList.add('admin-mode');
    document.getElementById('adminAuth').style.display = 'none';
    document.getElementById('adminPanel').style.display = 'block';
    document.getElementById('admin-q-form').style.display = 'block';
    document.getElementById('admin-regles-edit').style.display = 'block';
}

function renderAdminDemandes(demandes) {
    const container = document.getElementById('adminDemandes');
    const pending = Object.values(demandes || {}).filter(d => d.status === 'pending');
    
    // Le point rouge SEULEMENT si admin
    document.getElementById('notifDot').style.display = (pending.length && IS_ADMIN) ? 'block' : 'none';
    
    if(!IS_ADMIN) return;
    container.innerHTML = pending.map(d => `
        <div class="mcard">
            <div><strong>${d.user}</strong> : ${d.qTitle} (+${d.qPts} pts)</div>
            <div class="mactions">
                <button class="btn-sm btn-ok" onclick="valider('${d.id}', true)">Accepter</button>
                <button class="btn-sm btn-ko" onclick="valider('${d.id}', false)">Refuser</button>
            </div>
        </div>`).join('') || "Aucune demande.";
}

function valider(did, ok) {
    db.ref('demandes/' + did).once('value', s => {
        const d = s.val();
        if (ok) {
            db.ref('players/' + d.user + '/points').transaction(p => (p || 0) + parseInt(d.qPts));
            db.ref('demandes/' + did + '/status').set('accepted');
        } else {
            db.ref('demandes/' + did).remove();
        }
    });
}

function updatePts(name, val) { db.ref('players/' + name + '/points').transaction(p => (p || 0) + val); }
function setPts(name, val) { db.ref('players/' + name + '/points').set(parseInt(val) || 0); }

function addQuete() {
    const id = Date.now();
    const title = document.getElementById('qTitre').value;
    const desc = document.getElementById('qDesc').value;
    const pts = document.getElementById('qPts').value;
    if (title && pts) {
        db.ref('quetes/' + id).set({ id, title, desc, pts: parseInt(pts) });
        document.getElementById('qTitre').value = ''; document.getElementById('qDesc').value = ''; document.getElementById('qPts').value = '';
    }
}

function deleteQuete(id) { if(confirm("Supprimer ?")) db.ref('quetes/'+id).remove(); }
function resetScores() { if(confirm("Remettre à 0 ?")) db.ref('players').once('value', s => {
    Object.keys(s.val()).forEach(k => db.ref('players/'+k+'/points').set(0));
});}

function showTab(id) {
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.getElementById('view-' + id).classList.add('active');
    document.getElementById('tab' + id.charAt(0).toUpperCase() + id.slice(1)).classList.add('active');
}

function switchForm(f) {
    document.getElementById('formRegister').style.display = f === 'register' ? 'block' : 'none';
    document.getElementById('formLogin').style.display = f === 'login' ? 'block' : 'none';
}

function logout() { localStorage.clear(); location.reload(); }
if (ME) loginSuccess(ME);
</script>
</body>
</html>
