<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Les Twins - Online</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-analytics-compat.js"></script>

<style>
:root {
  --bg:#0d0d0f; --surface:#17171a; --surface2:#1f1f24;
  --accent:#e8ff47; --accent2:#ff4757;
  --text:#f0f0f0; --muted:#6b6b7a; --border:rgba(255,255,255,0.07);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(232,255,71,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(232,255,71,0.03) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0;}
.wrap{position:relative;z-index:1;max-width:700px;margin:0 auto;padding:2rem 1.2rem 4rem;}
header{text-align:center;margin-bottom:3rem;}
.logo{font-family:'Bebas Neue',sans-serif;font-size:clamp(52px,14vw,96px);letter-spacing:4px;line-height:1;color:var(--accent);text-shadow:0 0 60px rgba(232,255,71,0.25);}
.subtitle{font-size:13px;letter-spacing:3px;text-transform:uppercase;color:var(--muted);margin-top:6px;}

/* LOGIN */
#loginGate{display:flex;flex-direction:column;align-items:center;}
#loginGate .card{width:100%;max-width:420px;}
#app{display:none;}

/* TABS */
.tabs{display:flex;gap:8px;justify-content:center;margin-bottom:2rem;flex-wrap:wrap;}
.tab{background:var(--surface);border:1px solid var(--border);color:var(--muted);font-family:'DM Sans',sans-serif;font-size:13px;letter-spacing:1px;text-transform:uppercase;padding:8px 22px;border-radius:99px;cursor:pointer;transition:all 0.2s;position:relative;}
.tab:hover{border-color:var(--accent);color:var(--accent);}
.tab.active{background:var(--accent);color:#0d0d0f;border-color:var(--accent);font-weight:500;}
.tab.logout-tab{border-color:rgba(255,71,87,0.4);color:var(--accent2);}
.notif-dot{position:absolute;top:4px;right:4px;width:8px;height:8px;background:var(--accent2);border-radius:50%;display:none;}
.notif-dot.show{display:block;}
.view{display:none;}.view.active{display:block;}

/* BOARD */
.board{display:flex;flex-direction:column;gap:10px;}
.player-row{background:var(--surface);border:1px solid var(--border);border-radius:14px;display:flex;align-items:center;padding:14px 18px;gap:16px;transition:all 0.2s;animation:fadeUp 0.4s ease both;}
.rank-1{border-color:rgba(232,255,71,0.5);background:linear-gradient(90deg,rgba(232,255,71,0.06),var(--surface));}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
.rank-num{font-family:'Bebas Neue',sans-serif;font-size:28px;width:36px;text-align:center;color:var(--muted);flex-shrink:0;}
.avatar{width:42px;height:42px;border-radius:50%;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-weight:500;font-size:15px;border:2px solid var(--border);color:var(--accent);}
.player-name{flex:1;font-size:16px;font-weight:500;}
.pts-big{font-family:'Bebas Neue',sans-serif;font-size:32px;color:var(--accent);min-width:56px;text-align:right;}
.admin-pts-ctrl{display:none;align-items:center;gap:6px;}
body.admin-mode .admin-pts-ctrl{display:flex;}
body.admin-mode .pts-static{display:none;}
.btn-round{width:30px;height:30px;border-radius:50%;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;}

/* CARDS & FORMS */
.card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:28px;margin-bottom:16px;}
.card h2{font-family:'Bebas Neue',sans-serif;font-size:28px;color:var(--accent);margin-bottom:20px;}
.field{margin-bottom:16px;}
.field label{display:block;font-size:12px;text-transform:uppercase;color:var(--muted);margin-bottom:6px;}
.field input,.field textarea{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:12px 14px;color:var(--text);font-family:inherit;outline:none;}
.btn-main{width:100%;background:var(--accent);color:#0d0d0f;border:none;border-radius:10px;padding:13px;font-weight:500;cursor:pointer;}
.btn-sub{width:100%;background:var(--surface2);color:var(--text);border:1px solid var(--border);border-radius:10px;padding:12px;cursor:pointer;}
.fmsg{font-size:13px;margin-top:12px;text-align:center;min-height:18px;color:var(--accent);}
.fmsg.err{color:var(--accent2);}

/* QUETES */
.qcard{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:18px 20px;margin-bottom:10px;}
.qcard.done{opacity:0.45;}
.qheader{display:flex;align-items:flex-start;gap:12px;}
.qcheck{width:22px;height:22px;border-radius:6px;border:2px solid var(--border);background:var(--surface2);cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;margin-top:2px;font-size:13px;font-weight:700;}
.qcheck.pending{color: var(--accent); border-color: var(--accent);}
.qcheck.accepted{background:var(--accent); color:#0d0d0f;}
.qinfo{flex:1;}
.qtitle{font-size:16px;font-weight:500;margin-bottom:4px;}
.qdesc{font-size:13px;color:var(--muted);line-height:1.6;}
.qpts{font-family:'Bebas Neue',sans-serif;font-size:26px;color:var(--accent);text-align:right;}
.q-admin-bar{display:none;margin-top:12px;gap:8px;}
body.admin-mode .q-admin-bar{display:flex;}

/* MESSAGERIE */
.mcard{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:10px;}
.mactions{display:flex;gap:8px;margin-top:10px;}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="logo">Les Twins</div>
    <div class="subtitle">Classement Cloud Partagé</div>
  </header>

  <div id="loginGate">
    <div class="card" id="formRegister">
      <h2>S'inscrire</h2>
      <div class="field"><label>Pseudo</label><input type="text" id="regName"></div>
      <div class="field"><label>Mot de passe</label><input type="password" id="regPass"></div>
      <button class="btn-main" onclick="register()">Rejoindre</button>
      <div class="fmsg" id="regMsg"></div>
      <div style="text-align:center;margin-top:15px;font-size:13px;color:var(--muted)">Déjà un compte ? <span onclick="switchForm('login')" style="color:var(--accent);cursor:pointer">Se connecter</span></div>
    </div>
    <div class="card" id="formLogin" style="display:none;">
      <h2>Connexion</h2>
      <div class="field"><label>Pseudo</label><input type="text" id="loginName"></div>
      <div class="field"><label>Mot de passe</label><input type="password" id="loginPass"></div>
      <button class="btn-main" onclick="loginUser()">Entrer</button>
      <div class="fmsg" id="loginMsg"></div>
      <div style="text-align:center;margin-top:15px;font-size:13px;color:var(--muted)">Pas de compte ? <span onclick="switchForm('register')" style="color:var(--accent);cursor:pointer">S'inscrire</span></div>
    </div>
  </div>

  <div id="app">
    <div id="greetBar" style="text-align:center;margin-bottom:20px;font-size:14px;color:var(--muted)">Connecté : <strong id="greetName" style="color:var(--accent)"></strong></div>
    <div class="tabs">
      <button class="tab active" id="tabClassement" onclick="showTab('classement')">Classement</button>
      <button class="tab" id="tabQuetes" onclick="showTab('quetes')">Quêtes</button>
      <button class="tab" id="tabRegles" onclick="showTab('regles')">Règles</button>
      <button class="tab" id="tabAdmin" onclick="showTab('admin')">Admin<span class="notif-dot" id="notifDot"></span></button>
      <button class="tab logout-tab" onclick="logout()" style="color:var(--accent2)">Déconnexion</button>
    </div>

    <div class="view active" id="view-classement"><div class="board" id="board"></div></div>

    <div class="view" id="view-quetes">
      <div id="queteFormZone" style="display:none;" class="card">
        <h3>Nouvelle quête</h3>
        <div class="field"><label>Titre</label><input type="text" id="qTitre"></div>
        <div class="field"><label>Description</label><textarea id="qDesc" rows="2"></textarea></div>
        <div class="field"><label>Points</label><input type="number" id="qPts"></div>
        <button class="btn-main" onclick="submitQuete()">Ajouter la quête</button>
      </div>
      <div id="queteList"></div>
    </div>

    <div class="view" id="view-regles">
      <div class="card">
        <h2>Règles</h2>
        <div id="reglesDisplay" style="white-space:pre-wrap;"></div>
        <div id="reglesEditZone" style="display:none;margin-top:20px;">
          <textarea id="reglesTextarea" rows="10" style="width:100%"></textarea>
          <button class="btn-main" onclick="saveRegles()">Enregistrer</button>
        </div>
      </div>
    </div>

    <div class="view" id="view-admin">
      <div class="card" id="adminLoginCard">
        <h2>Accès Admin</h2>
        <input type="password" id="adminPass" placeholder="Code secret">
        <button class="btn-main" style="margin-top:10px" onclick="loginAdmin()">Entrer</button>
      </div>
      <div id="adminPanel" style="display:none;">
        <div class="card">
          <h2>Demandes</h2>
          <div id="adminMessages"></div>
        </div>
        <button class="btn-sub" onclick="logoutAdmin()">Quitter Admin</button>
      </div>
    </div>
  </div>
</div>

<script>
// --- CONFIGURATION FIREBASE ---
const firebaseConfig = {
  apiKey: "AIzaSyDo3kpFvkpAZN_dD7V6XhVsYtK7SOar5Y0",
  authDomain: "les-twins-53038.firebaseapp.com",
  projectId: "les-twins-53038",
  storageBucket: "les-twins-53038.firebasestorage.app",
  messagingSenderId: "136681860548",
  appId: "1:136681860548:web:76a5e7f4bdf698bf858891",
  measurementId: "G-TLE8CTV06D",
  databaseURL: "https://les-twins-53038-default-rtdb.europe-west1.firebasedatabase.app/"
};

// Initialisation Firebase
firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const analytics = firebase.analytics();

const ADMIN_PWD = 'twins2024';
let ME = localStorage.getItem('twins_user');
let ADMIN = localStorage.getItem('twins_admin') === '1';

// Synchronisation en temps réel avec le cloud
db.ref('/').on('value', (snapshot) => {
  const data = snapshot.val() || {players:{}, quetes:{}, demandes:{}, regles:""};
  renderAll(data);
});

/* AUTH */
function switchForm(t) {
  document.getElementById('formRegister').style.display = t==='register'?'block':'none';
  document.getElementById('formLogin').style.display = t==='login'?'block':'none';
}

function register() {
  const name = document.getElementById('regName').value.trim();
  const pass = document.getElementById('regPass').value;
  if(!name || pass.length < 3) return;
  db.ref('players/' + name).set({name, pass, points:0});
  enterApp(name);
}

function loginUser() {
  const name = document.getElementById('loginName').value.trim();
  const pass = document.getElementById('loginPass').value;
  db.ref('players/' + name).once('value', (s) => {
    const u = s.val();
    if(u && u.pass === pass) enterApp(name);
    else alert("Identifiants incorrects");
  });
}

function enterApp(name) {
  ME = name; localStorage.setItem('twins_user', name);
  document.getElementById('loginGate').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  document.getElementById('greetName').textContent = name;
  if(ADMIN) activateAdmin();
}

function loginAdmin() {
  if(document.getElementById('adminPass').value === ADMIN_PWD) {
    ADMIN = true; localStorage.setItem('twins_admin','1');
    activateAdmin();
  }
}

function activateAdmin() {
  document.body.classList.add('admin-mode');
  document.getElementById('adminLoginCard').style.display = 'none';
  document.getElementById('adminPanel').style.display = 'block';
  document.getElementById('reglesEditZone').style.display = 'block';
  document.getElementById('queteFormZone').style.display = 'block';
}

function logout() { localStorage.clear(); location.reload(); }
function logoutAdmin() { localStorage.removeItem('twins_admin'); location.reload(); }

/* RENDERS */
function renderAll(data) {
  renderBoard(data.players);
  renderQuetes(data.quetes, data.demandes);
  renderRegles(data.regles);
  renderAdminMessages(data.demandes, data.quetes);
  
  const pendingCount = Object.values(data.demandes || {}).filter(d=>d.status==='pending').length;
  document.getElementById('notifDot').classList.toggle('show', pendingCount > 0);
}

function renderBoard(players) {
  const el = document.getElementById('board');
  const sorted = Object.values(players || {}).sort((a,b)=>b.points - a.points);
  el.innerHTML = sorted.map((p, i) => `
    <div class="player-row ${i===0?'rank-1':''}">
      <div class="rank-num">${i+1}</div>
      <div class="avatar">${p.name[0].toUpperCase()}</div>
      <div class="player-name">${p.name} ${p.name===ME?'(toi)':''}</div>
      <div class="admin-pts-ctrl">
        <button class="btn-round" onclick="changePts('${p.name}', -1)">-</button>
        <button class="btn-round" onclick="changePts('${p.name}', 1)">+</button>
      </div>
      <div class="pts-static"><div class="pts-big">${p.points}</div></div>
    </div>
  `).join('');
}

function changePts(name, val) {
  db.ref('players/'+name+'/points').transaction(p => (p||0) + val);
}

function renderQuetes(quetes, demandes) {
  const el = document.getElementById('queteList');
  el.innerHTML = Object.values(quetes || {}).map(q => {
    const myDem = Object.values(demandes || {}).find(d => d.qId === q.id && d.user === ME);
    const status = myDem ? myDem.status : '';
    return `
      <div class="qcard ${status==='accepted'?'done':''}">
        <div class="qheader">
          <div class="qcheck ${status}" onclick="demanderQuete('${q.id}')">${status==='accepted'?'✓':(status==='pending'?'⏳':'')}</div>
          <div class="qinfo"><div class="qtitle">${q.title}</div><div class="qdesc">${q.desc}</div></div>
          <div class="qpts">${q.pts}</div>
        </div>
        <div class="q-admin-bar"><button onclick="deleteQuete('${q.id}')" style="color:var(--accent2);background:none;border:none;cursor:pointer">Supprimer</button></div>
      </div>
    `;
  }).join('');
}

function submitQuete() {
  const title = document.getElementById('qTitre').value;
  const pts = parseInt(document.getElementById('qPts').value);
  const desc = document.getElementById('qDesc').value;
  if(!title || !pts) return;
  const id = Date.now().toString();
  db.ref('quetes/'+id).set({id, title, desc, pts});
  document.getElementById('qTitre').value = '';
  document.getElementById('qPts').value = '';
  document.getElementById('qDesc').value = '';
}

function deleteQuete(id) { db.ref('quetes/'+id).remove(); }

function demanderQuete(qId) {
  const id = ME + "_" + qId;
  db.ref('demandes/'+id).set({id, qId, user: ME, status: 'pending'});
}

function renderAdminMessages(demandes, quetes) {
  const el = document.getElementById('adminMessages');
  const pending = Object.values(demandes || {}).filter(d => d.status === 'pending');
  if(pending.length === 0) { el.innerHTML = '<div style="color:var(--muted)">Aucune demande en attente.</div>'; return; }
  el.innerHTML = pending.map(d => {
    const q = quetes ? quetes[d.qId] : null;
    return `
      <div class="mcard">
        <strong>${d.user}</strong> a fini : ${q ? q.title : 'Quête inconnue'}
        <div class="mactions">
          <button class="btn-main" style="padding:5px 15px" onclick="repondreDemande('${d.id}', true)">Accepter</button>
          <button class="btn-sub" style="padding:5px 15px" onclick="repondreDemande('${d.id}', false)">Refuser</button>
        </div>
      </div>
    `;
  }).join('');
}

function repondreDemande(dId, accept) {
  db.ref('demandes/'+dId).once('value', s => {
    const d = s.val();
    if(accept) {
      db.ref('quetes/'+d.qId).once('value', sq => {
        const q = sq.val();
        if(q) db.ref('players/'+d.user+'/points').transaction(p => (p||0) + q.pts);
        db.ref('demandes/'+dId+'/status').set('accepted');
      });
    } else {
      db.ref('demandes/'+dId+'/status').set('rejected');
    }
  });
}

function renderRegles(r) {
  document.getElementById('reglesDisplay').textContent = r || "Aucune règle.";
  document.getElementById('reglesTextarea').value = r || "";
}
function saveRegles() { db.ref('regles').set(document.getElementById('reglesTextarea').value); }

function showTab(id) {
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.getElementById('view-'+id).classList.add('active');
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  const tabEl = document.getElementById('tab'+id.charAt(0).toUpperCase()+id.slice(1));
  if(tabEl) tabEl.classList.add('active');
}

if(ME) enterApp(ME);
</script>
</body>
</html>
